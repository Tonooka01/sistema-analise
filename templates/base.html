<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard Financeiro{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js and Datalabels Plugin (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- GridStack (CDN) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/8.1.1/gridstack.min.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gridstack.js/8.1.1/gridstack-all.js"></script>

    <!-- Link para o seu CSS estático -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8 !important; }
        .nv-topbar {
            background: linear-gradient(135deg, #091f42 0%, #0f2d5e 60%, #163a75 100%) !important;
            border-radius: 14px !important; padding: 1rem 1.5rem !important;
            margin-bottom: 1.25rem !important; display: flex !important;
            align-items: center !important; justify-content: space-between !important;
            box-shadow: 0 4px 20px rgba(15,45,94,0.15) !important;
        }
        .nv-topbar h1 { font-size: 1.3rem !important; font-weight: 700 !important; color: #ffffff !important; margin: 0 !important; display: flex !important; align-items: center !important; gap: 0.5rem !important; }
        .nv-topbar h1::before { content: '' !important; display: inline-block !important; width: 4px !important; height: 1.3rem !important; background: #00aaff !important; border-radius: 4px !important; }
        .nv-topbar-actions { display: flex !important; gap: 0.5rem !important; flex-wrap: wrap !important; align-items: center !important; }
        .btn { display: inline-flex !important; align-items: center !important; gap: 0.35rem !important; font-size: 0.82rem !important; font-weight: 600 !important; padding: 0.4rem 0.9rem !important; border-radius: 7px !important; border: none !important; cursor: pointer !important; text-decoration: none !important; }
        .btn-ghost { background: rgba(255,255,255,0.15) !important; color: #fff !important; border: 1px solid rgba(255,255,255,0.25) !important; }
        .btn-ghost:hover { background: rgba(255,255,255,0.25) !important; }
        .btn-danger { background: #ef4444 !important; color: #fff !important; }
        .btn-danger:hover { background: #dc2626 !important; }
        .collection-bar { background: #ffffff !important; border-radius: 14px !important; padding: 0.875rem 1.25rem !important; margin-bottom: 1.25rem !important; box-shadow: 0 2px 8px rgba(15,45,94,0.08) !important; border: 1px solid #dde3ec !important; display: flex !important; flex-wrap: wrap !important; gap: 0.5rem !important; align-items: center !important; justify-content: center !important; }
        .collection-selector button { font-size: 0.82rem !important; font-weight: 600 !important; padding: 0.42rem 1rem !important; border-radius: 7px !important; border: 1.5px solid transparent !important; background: #0f2d5e !important; color: #ffffff !important; cursor: pointer !important; white-space: nowrap !important; }
        .collection-selector button:hover { background: #163a75 !important; }
        .collection-selector button.active { background: #00aaff !important; border-color: #0090d6 !important; }
        #customAnalysisSelector { font-size: 0.82rem !important; font-weight: 600 !important; padding: 0.42rem 2rem 0.42rem 1rem !important; border-radius: 7px !important; background-color: #6d28d9 !important; color: #ffffff !important; border: none !important; cursor: pointer !important; appearance: none !important; -webkit-appearance: none !important; }
        #saveLayoutBtn { font-size: 0.82rem !important; font-weight: 600 !important; padding: 0.42rem 1rem !important; border-radius: 7px !important; background: #10b981 !important; color: #fff !important; border: none !important; cursor: pointer !important; }
        .card { background: #ffffff !important; border-radius: 14px !important; box-shadow: 0 2px 8px rgba(15,45,94,0.08) !important; border: 1px solid #dde3ec !important; }
        .grid-stack-item-content { background: #ffffff !important; border-radius: 10px !important; box-shadow: 0 2px 8px rgba(15,45,94,0.08) !important; border: 1px solid #dde3ec !important; }
        .chart-container-header { border-bottom: 2px solid #00aaff !important; padding-bottom: 0.5rem !important; margin-bottom: 0.5rem !important; display: flex !important; justify-content: space-between !important; align-items: center !important; }
        .chart-title { font-weight: 700 !important; color: #0f2d5e !important; font-size: 0.875rem !important; }
        table th { background: #0f2d5e !important; color: #ffffff !important; font-size: 0.72rem !important; padding: 9px 12px !important; }
        table td { padding: 8px 12px !important; border-bottom: 1px solid #eef0f4 !important; font-size: 0.83rem !important; }
        table tr:hover td { background: #f5f8ff !important; }
        #viewTableBtn { background: #6d28d9 !important; color: #fff !important; padding: 0.55rem 1.4rem !important; border-radius: 10px !important; border: none !important; cursor: pointer !important; font-weight: 600 !important; }
        .modal-content { border-top: 4px solid #00aaff !important; border-radius: 14px !important; }
        .tab-link.active { color: #1d6dcc !important; border-bottom: 2px solid #1d6dcc !important; }
    </style>
</head>
<body class="p-2 md:p-4">
    <!-- ALTERAÇÃO CRÍTICA: Mudado de 'container' para 'custom-container' para remover limite fixo do Tailwind -->
    <div class="custom-container mx-auto"> 
        {% block content %}{% endblock %}
    </div>

    <!-- Inclui os Modais -->
    {% include 'partials/modals.html' %}

    <script>
document.addEventListener('DOMContentLoaded', () => {
    // Referências do NOVO Modal Centralizado
    const adminSettingsModal = document.getElementById('adminSettingsModal');
    const openBtn = document.getElementById('openAdminSettingsModalBtn');
    const closeBtn = document.getElementById('closeAdminSettingsModalBtn');

    // Referências dos Elementos INTERNOS (Movidos para o Modal)
    const timeoutInput = document.getElementById('inactivityTimeout');
    const saveButton = document.getElementById('saveTimeoutBtn');
    const statusSpan = document.getElementById('timeoutStatus');

    let timeoutMinutes = 30;
    let lastActivity = Date.now();
    let timeoutId;
    
    // --- Funções de Timer (Mantidas Iguais) ---
    function resetTimer() {
        lastActivity = Date.now();
        clearTimeout(timeoutId);
        timeoutId = setTimeout(checkInactivity, (timeoutMinutes * 60 * 1000) + 1000); 
    }
    
    const usersTableBody = document.getElementById('usersTableBody');
    const refreshUsersBtn = document.getElementById('refreshUsersBtn');

    // REFERÊNCIAS NOVAS DO TOGGLE
    const toggleCreateUserBtn = document.getElementById('toggleCreateUserBtn');
    const createUserFormContainer = document.getElementById('createUserFormContainer');

    // Lógica do Botão "Novo Usuário"
    toggleCreateUserBtn?.addEventListener('click', () => {
        // Alterna a classe 'hidden'
        createUserFormContainer.classList.toggle('hidden');
        
        // (Opcional) Muda o texto do botão
        if (createUserFormContainer.classList.contains('hidden')) {
            toggleCreateUserBtn.innerHTML = '➕ Novo Usuário';
            toggleCreateUserBtn.classList.remove('bg-gray-500', 'hover:bg-gray-600');
            toggleCreateUserBtn.classList.add('bg-purple-600', 'hover:bg-purple-700');
        } else {
            toggleCreateUserBtn.innerHTML = '➖ Cancelar';
            toggleCreateUserBtn.classList.remove('bg-purple-600', 'hover:bg-purple-700');
            toggleCreateUserBtn.classList.add('bg-gray-500', 'hover:bg-gray-600');
            
            // Foca no campo de usuário para agilizar
            document.getElementById('modalUsername')?.focus();
        }
    });

    // Função para Carregar Usuários
    async function loadUsers() {
        if (!usersTableBody) return;
        
        try {
            const response = await fetch('/api/admin/users');
            const users = await response.json();
            
            usersTableBody.innerHTML = '';
            
            users.forEach(u => {
                // Define Status Online/Offline
                let statusBadge = u.is_online 
                    ? `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800">● Online</span>`
                    : `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800">Offline</span>`;
                
                // Define Botão de Ação (Ativar/Desativar)
                let actionBtnClass = u.is_active ? 'bg-red-100 text-red-700 hover:bg-red-200' : 'bg-green-100 text-green-700 hover:bg-green-200';
                let actionBtnText = u.is_active ? 'Bloquear 🚫' : 'Ativar ✅';
                let rowOpacity = u.is_active ? '' : 'opacity-60 bg-red-50'; // Deixa meio transparente se bloqueado

                const row = `
                    <tr class="border-b border-gray-100 ${rowOpacity}">
                        <td class="py-2 px-3 font-medium text-gray-700">${u.username}</td>
                        <td class="py-2 px-3 text-center">${statusBadge}</td>
                        <td class="py-2 px-3 text-center text-xs text-gray-500">${u.last_seen || 'Nunca'}</td>
                        <td class="py-2 px-3 text-center flex justify-center gap-2">
                            <button onclick="toggleUserStatus(${u.id})" class="px-2 py-1 rounded text-xs font-bold transition ${actionBtnClass}">
                                ${actionBtnText}
                            </button>
                            </td>
                    </tr>
                `;
                usersTableBody.innerHTML += row;
            });
        } catch (e) {
            console.error("Erro ao listar usuários", e);
            usersTableBody.innerHTML = '<tr><td colspan="4" class="text-center text-red-500 py-2">Erro ao carregar.</td></tr>';
        }
    }

    // Função Global para o botão de Toggle (precisa ser window.toggleUserStatus para funcionar no onclick do HTML gerado)
    window.toggleUserStatus = async function(userId) {
        if(!confirm("Tem certeza que deseja alterar o acesso deste usuário?")) return;
        
        try {
            const res = await fetch('/api/admin/users/toggle', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId})
            });
            if(res.ok) {
                loadUsers(); // Recarrega a tabela
            } else {
                const err = await res.json();
                alert("Erro: " + err.error);
            }
        } catch(e) {
            alert("Erro de conexão.");
        }
    };

    // Adiciona carregamento ao abrir o modal
    openBtn?.addEventListener('click', () => {
        openModal(); // Sua função existente
        loadUsers(); // Nova chamada
    });
    
    refreshUsersBtn?.addEventListener('click', loadUsers);

    function checkInactivity() {
        const elapsed = Date.now() - lastActivity;
        const limit = timeoutMinutes * 60 * 1000;

        if (elapsed > limit) {
            console.warn(`Sessão expirada por inatividade (${timeoutMinutes} min). Redirecionando para login.`);
            window.location.href = "/logout?reason=inactivity"; 
        }
    }
    // ------------------------------------------

    // 1. Carregar Configurações Iniciais
    async function loadSettings() {
        try {
            const response = await fetch('/api/admin/settings');
            if (response.ok) {
                const data = await response.json();
                timeoutMinutes = parseInt(data.timeout_minutes) || 30;
                
                if (timeoutInput) { 
                    timeoutInput.value = timeoutMinutes; // Atualiza o input dentro do modal
                }
            }
        } catch (e) {
            console.error("Não foi possível carregar tempo de inatividade.", e);
        }
        resetTimer(); 
    }
    
    // 2. Salvar Handler (Evento do Botão Salvar dentro do Modal)
    saveButton?.addEventListener('click', async () => {
        const newTimeout = parseInt(timeoutInput.value);
        if (newTimeout < 5 || newTimeout > 360 || isNaN(newTimeout)) {
            statusSpan.textContent = "Valor deve ser entre 5 e 360 min.";
            statusSpan.classList.remove('text-green-700', 'hidden');
            statusSpan.classList.add('text-red-700');
            return;
        }

        try {
            const response = await fetch('/api/admin/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ timeout: newTimeout })
            });
            if (response.ok) {
                timeoutMinutes = newTimeout;
                resetTimer();
                statusSpan.textContent = `Configuração salva (${newTimeout} min)!`;
                statusSpan.classList.remove('text-red-700', 'hidden');
                statusSpan.classList.add('text-green-700');
                setTimeout(() => statusSpan.classList.add('hidden'), 3000);
            }
        } catch (e) {
            statusSpan.textContent = "Erro ao salvar no servidor.";
            statusSpan.classList.remove('text-green-700', 'hidden');
            statusSpan.classList.add('text-red-700');
        }
    });

    // 3. Funções de controle do Modal
    function openModal(e) {
        if (e) e.preventDefault(); 
        if (adminSettingsModal) adminSettingsModal.classList.add('show');
    }
    
    function closeModal() {
        if (adminSettingsModal) adminSettingsModal.classList.remove('show');
        // Limpa o status ao fechar
        statusSpan.classList.add('hidden');
    }

    // Inicializar e Monitorar Eventos do Usuário
    loadSettings();
    openBtn?.addEventListener('click', openModal);
    closeBtn?.addEventListener('click', closeModal);

    // Fechar ao clicar fora e Monitoramento de Atividade (Mantido Igual)
    adminSettingsModal?.addEventListener('click', (e) => { if (e.target === adminSettingsModal) closeModal(); });
    ['mousemove', 'mousedown', 'keypress', 'scroll', 'touchstart'].forEach(event => {
        document.addEventListener(event, resetTimer, true);
    });
});
</script>
    
    <!-- Carrega o JavaScript principal COMO MÓDULO e usando url_for -->
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
